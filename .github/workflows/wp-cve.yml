name: wp-cve

# Denná CVE matica: pluginy/verzie z wp_snapshots (poslal WP agent) × WPScan → vulns.
# Vyžaduje WPSCAN_TOKEN (wpscan.com, free 25/deň).
#
# MUSÍ bežať denne, nie týždenne: WPScan kvóta je 25 za DEŇ, takže týždenný beh
# z nej vie využiť len 25/týždeň. Naplnenie cache (~188 cieľov) by trvalo ~8
# týždňov a na 30-dňový TTL refresh by bolo treba ~188 lookupov/mesiac, kým
# týždenný beh dodá len ~107 → cache by sa nikdy nestihla obnoviť. Denne = 175
# využiteľných lookupov/týždeň, naplnenie za ~8 dní. Pondelkový beh ostáva o
# 06:00 pred history.yml (07:00), ktorý na CVE dáta nadväzuje.
on:
  schedule:
    - cron: '0 6 * * *' # denne 06:00 UTC
  workflow_dispatch: {}

jobs:
  cve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build core (severity helper)
        run: pnpm --filter @agency/core build
      - name: Run WP CVE probe
        run: node tools/wp-cve/index.mjs
        env:
          WPSCAN_TOKEN: ${{ secrets.WPSCAN_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
