name: history

# Týždenný snapshot metrík (trendy) + log veľkých zmien. Beží po ostatných collectoroch.
on:
  schedule:
    - cron: '0 7 * * 1' # pondelok 07:00 UTC (po AEO/SEO/PSI/Security/CVE)
  workflow_dispatch: {}

jobs:
  history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run history snapshot
        run: node tools/history-snapshot/index.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
