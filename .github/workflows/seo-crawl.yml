name: seo-crawl

# Týždenný technický SEO crawl (broken links, title/meta/H1, canonical, alt,
# mixed content, sitemap/robots). Bez API kľúčov. Rešpektuje robots.txt, ~2 req/s.
on:
  schedule:
    - cron: '0 4 * * 1' # každý pondelok 04:00 UTC
  workflow_dispatch: {}
  # Manuálne dofsetovanie mimo cronu — spusti pushom tagu `collect-*`
  # (napr. po nasadení opráv, aby sa dáta obnovili hneď, nie až v pondelok).
  push:
    tags:
      - 'collect-*'

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agency/core build
      - name: Run SEO crawl
        run: node tools/seo-crawl/index.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
