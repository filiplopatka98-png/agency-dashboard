name: wp-probe

# Týždenný WordPress agent: verzie/pluginy/updaty (cez HMAC mu-plugin) + WPScan CVE → wp_snapshots.
# Vyžaduje WP_AGENT_SECRET (ten istý ako v wp-config MONITORIX_AGENT_SECRET).
# WPSCAN_TOKEN je voliteľný — bez neho sa CVE preskočia (25 req/deň free limit).
on:
  schedule:
    - cron: '0 5 * * 1' # každý pondelok 05:00 UTC
  workflow_dispatch: {}

jobs:
  wp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run WP probe
        run: node tools/wp-probe/index.mjs
        env:
          WP_AGENT_SECRET: ${{ secrets.WP_AGENT_SECRET }}
          WPSCAN_TOKEN: ${{ secrets.WPSCAN_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
